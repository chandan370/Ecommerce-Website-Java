name: Basic Deploy Test

on:
  push:
    branches:
      - main

jobs:
  test-ssh:
    runs-on: ubuntu-latest
     environment: defualt

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if secrets exist
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST missing"; else echo "EC2_HOST present"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER missing"; else echo "EC2_USER present"; fi
          if [ -z "${{ secrets.EC2_PORT }}" ]; then echo "EC2_PORT missing"; else echo "EC2_PORT present"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY missing"; else echo "EC2_SSH_KEY present"; fi

      - name: Connect to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            pwd
            ls
            whoami
